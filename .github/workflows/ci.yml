name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP Syntax Check
        run: |
          find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" | \
            xargs -P 4 -n 1 php -l 2>&1 | grep -v "No syntax errors" || true
          # Fail if any syntax errors found
          find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" | \
            xargs -P 4 -n 1 php -l 2>&1 | grep -q "Parse error" && exit 1 || true

  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: fronote_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, json, mbstring
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Create .env
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_NAME=/DB_NAME=fronote_test/' .env
          sed -i 's/DB_USER=/DB_USER=root/' .env
          sed -i 's/DB_PASS=/DB_PASS=root/' .env
          sed -i 's/APP_ENV=production/APP_ENV=testing/' .env

      - name: Import database schema
        run: mysql -h 127.0.0.1 -u root -proot fronote_test < pronote.sql

      - name: Run Unit Tests
        run: composer test:unit

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Composer Audit
        run: composer audit

  js-lint:
    name: JavaScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS syntax
        run: |
          find assets/js -name "*.js" | while read f; do
            node --check "$f" 2>&1 || exit 1
          done

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "Deploy to staging — configure your deployment script here"

  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [test, security]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploy to production — configure your deployment script here"
